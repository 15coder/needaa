[build]
  base    = "."
  command = "npm install -g pnpm@9 && pnpm install --frozen-lockfile && pnpm --filter @workspace/portfolio build"
  publish = "artifacts/portfolio/dist/public"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV     = "production"
  BASE_PATH    = "/"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
